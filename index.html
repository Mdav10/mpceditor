<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyMom | Drag & Resize Text Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #0a0e1a;
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #00ff41;
        }
        .header h1 {
            color: #00ff41;
            font-size: 28px;
        }
        .header p {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }
        .upload-area {
            background: #111;
            border: 2px dashed #00ff41;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #ff00ff;
            background: #1a1a2e;
        }
        .upload-area input {
            display: none;
        }
        .upload-area label {
            color: #00ff41;
            font-size: 16px;
            cursor: pointer;
        }
        .editor-area {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .image-panel {
            flex: 2;
            min-width: 500px;
            background: #111;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #00ff41;
        }
        .image-panel h3 {
            color: #00ff41;
            margin-bottom: 15px;
        }
        .image-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            text-align: center;
            overflow: auto;
        }
        .image-container {
            position: relative;
            display: inline-block;
        }
        #permitImage {
            max-width: 100%;
            height: auto;
            border: 1px solid #00ff41;
            border-radius: 5px;
            background: #fff;
            display: block;
        }
        .text-overlay {
            position: absolute;
            cursor: move;
            background: transparent;
            border: 2px solid #00ff41;
            border-radius: 3px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .text-overlay:hover {
            border-color: #ff00ff;
            background: rgba(255,0,255,0.1);
        }
        .text-overlay.selected {
            border-color: #ff00ff;
            border-width: 3px;
            background: rgba(255,0,255,0.15);
        }
        .text-overlay .text-content {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #000;
            background: #fff;
            padding: 0 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 12px;
            height: 12px;
            background: #ff00ff;
            cursor: nw-resize;
            border-radius: 0 0 3px 0;
        }
        .controls-panel {
            flex: 1;
            min-width: 280px;
            background: #111;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #00ff41;
        }
        .controls-panel h3 {
            color: #ff00ff;
            margin-bottom: 15px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #ff00ff;
            color: #fff;
        }
        .btn-danger {
            background: #ff4444;
            color: #fff;
        }
        .text-boxes-list {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .text-box-item {
            background: #1a1a2e;
            margin: 8px 0;
            padding: 10px;
            border-radius: 5px;
            border-left: 3px solid #00ff41;
        }
        .text-box-item.selected {
            border-left-color: #ff00ff;
            background: #2a2a3e;
        }
        .text-box-item input {
            width: 100%;
            background: #222;
            border: 1px solid #00ff41;
            color: #0f0;
            padding: 5px;
            border-radius: 3px;
            margin: 5px 0;
            font-weight: bold;
        }
        .text-box-item .label {
            color: #ff00ff;
            font-size: 11px;
        }
        .text-box-item .size-control {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }
        .text-box-item .size-control button {
            padding: 3px 8px;
            font-size: 11px;
        }
        .delete-box {
            background: #ff4444;
            color: #fff;
            padding: 3px 8px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 5px;
        }
        .status {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 12px;
            color: #00ff41;
            text-align: center;
        }
        hr {
            border-color: #333;
            margin: 15px 0;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📷 MONEYMOM | DRAG & RESIZE TEXT EDITOR</h1>
        <p>Upload image → Add text box → Drag to position → Resize to cover old text → Edit text → Save</p>
    </div>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/jpg">
        <label>📤 CLICK TO UPLOAD PERMIT IMAGE</label>
    </div>

    <div class="editor-area" id="editorArea" style="display: none;">
        <div class="image-panel">
            <h3>📄 PERMIT IMAGE</h3>
            <div class="image-wrapper">
                <div class="image-container" id="imageContainer">
                    <img id="permitImage" alt="Permit Image">
                </div>
            </div>
            <div class="status" id="status">✅ Drag boxes to position | Resize from bottom-right corner | Edit text below</div>
        </div>
        
        <div class="controls-panel">
            <h3>✏️ TEXT BOXES</h3>
            <div class="button-group">
                <button id="addBoxBtn">➕ ADD NEW TEXT BOX</button>
                <button id="saveImageBtn">💾 SAVE & DOWNLOAD</button>
                <button id="resetAllBtn" class="btn-danger">⟳ RESET ALL</button>
            </div>
            <hr>
            <div id="textBoxesList" class="text-boxes-list">
                <p style="color:#666; text-align:center;">Click "Add text box" to create an editable area</p>
            </div>
        </div>
    </div>
</div>

<script>
    // DOM elements
    const fileInput = document.getElementById('fileInput');
    const editorArea = document.getElementById('editorArea');
    const permitImage = document.getElementById('permitImage');
    const imageContainer = document.getElementById('imageContainer');
    const statusDiv = document.getElementById('status');
    const textBoxesListDiv = document.getElementById('textBoxesList');
    const addBoxBtn = document.getElementById('addBoxBtn');
    const saveImageBtn = document.getElementById('saveImageBtn');
    const resetAllBtn = document.getElementById('resetAllBtn');
    
    // Data
    let textBoxes = [];
    let nextId = 1;
    let selectedBoxId = null;
    let dragging = false;
    let resizing = false;
    let dragStart = { x: 0, y: 0 };
    let originalBox = { x: 0, y: 0, w: 0, h: 0 };
    let currentImageFile = null;
    
    // Save to localStorage
    function saveState() {
        const state = {
            textBoxes: textBoxes,
            imageSrc: permitImage.src
        };
        localStorage.setItem('permitEditorState', JSON.stringify(state));
    }
    
    // Load from localStorage
    function loadState() {
        const saved = localStorage.getItem('permitEditorState');
        if (saved) {
            try {
                const state = JSON.parse(saved);
                if (state.imageSrc && state.imageSrc !== window.location.href) {
                    permitImage.src = state.imageSrc;
                    textBoxes = state.textBoxes || [];
                    nextId = Math.max(...textBoxes.map(b => b.id), 0) + 1;
                    permitImage.onload = () => {
                        renderAllTextBoxes();
                        editorArea.style.display = 'flex';
                        statusDiv.innerHTML = '✅ Loaded saved permit. Drag boxes to position, resize to cover old text.';
                    };
                }
            } catch(e) {}
        }
    }
    
    // Render all text boxes
    function renderAllTextBoxes() {
        // Remove existing overlays
        const existing = document.querySelectorAll('.text-overlay');
        existing.forEach(el => el.remove());
        
        // Create overlays
        textBoxes.forEach(box => {
            const container = document.querySelector('.image-container');
            if (!container) return;
            
            const overlay = document.createElement('div');
            overlay.className = 'text-overlay';
            if (box.id === selectedBoxId) overlay.classList.add('selected');
            overlay.setAttribute('data-id', box.id);
            overlay.style.left = box.x + 'px';
            overlay.style.top = box.y + 'px';
            overlay.style.width = box.w + 'px';
            overlay.style.height = box.h + 'px';
            
            const textDiv = document.createElement('div');
            textDiv.className = 'text-content';
            textDiv.style.fontSize = box.fontSize + 'px';
            textDiv.textContent = box.text || '';
            overlay.appendChild(textDiv);
            
            const resizeHandle = document.createElement('div');
            resizeHandle.className = 'resize-handle';
            resizeHandle.addEventListener('mousedown', (e) => startResize(e, box.id));
            overlay.appendChild(resizeHandle);
            
            overlay.addEventListener('mousedown', (e) => {
                if (e.target === resizeHandle) return;
                startDrag(e, box.id);
            });
            
            container.appendChild(overlay);
        });
        
        updateTextBoxesList();
        saveState();
    }
    
    // Update the side panel list
    function updateTextBoxesList() {
        if (textBoxes.length === 0) {
            textBoxesListDiv.innerHTML = '<p style="color:#666; text-align:center;">Click "Add text box" to create an editable area</p>';
            return;
        }
        
        let html = '';
        textBoxes.forEach(box => {
            html += `
                <div class="text-box-item ${box.id === selectedBoxId ? 'selected' : ''}" data-id="${box.id}">
                    <div class="label">📦 Box ${box.id}</div>
                    <input type="text" class="box-text" data-id="${box.id}" value="${escapeHtml(box.text || '')}" placeholder="Text to display">
                    <div class="size-control">
                        <button class="font-minus" data-id="${box.id}">🔽 Smaller</button>
                        <button class="font-plus" data-id="${box.id}">🔼 Bigger</button>
                        <span style="color:#0f0; font-size:11px;">Font: ${box.fontSize}px</span>
                    </div>
                    <button class="delete-box" data-id="${box.id}">🗑️ Delete</button>
                </div>
            `;
        });
        textBoxesListDiv.innerHTML = html;
        
        // Add event listeners
        document.querySelectorAll('.box-text').forEach(input => {
            input.addEventListener('change', (e) => {
                const id = parseInt(input.dataset.id);
                const box = textBoxes.find(b => b.id === id);
                if (box) {
                    box.text = input.value;
                    updateOverlayText(id, box.text);
                    statusDiv.innerHTML = `✅ Updated text: "${box.text}"`;
                    saveState();
                }
            });
        });
        
        document.querySelectorAll('.font-plus').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const box = textBoxes.find(b => b.id === id);
                if (box) {
                    box.fontSize = Math.min(72, box.fontSize + 2);
                    updateOverlayFontSize(id, box.fontSize);
                    statusDiv.innerHTML = `🔍 Font size: ${box.fontSize}px`;
                    saveState();
                }
            });
        });
        
        document.querySelectorAll('.font-minus').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                const box = textBoxes.find(b => b.id === id);
                if (box) {
                    box.fontSize = Math.max(8, box.fontSize - 2);
                    updateOverlayFontSize(id, box.fontSize);
                    statusDiv.innerHTML = `🔍 Font size: ${box.fontSize}px`;
                    saveState();
                }
            });
        });
        
        document.querySelectorAll('.delete-box').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                textBoxes = textBoxes.filter(b => b.id !== id);
                if (selectedBoxId === id) selectedBoxId = null;
                renderAllTextBoxes();
                statusDiv.innerHTML = `🗑️ Deleted box ${id}`;
                saveState();
            });
        });
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function updateOverlayText(id, text) {
        const overlay = document.querySelector(`.text-overlay[data-id="${id}"]`);
        if (overlay) {
            overlay.querySelector('.text-content').textContent = text || '';
        }
    }
    
    function updateOverlayFontSize(id, fontSize) {
        const overlay = document.querySelector(`.text-overlay[data-id="${id}"]`);
        if (overlay) {
            overlay.querySelector('.text-content').style.fontSize = fontSize + 'px';
        }
    }
    
    // Start dragging
    function startDrag(e, boxId) {
        e.stopPropagation();
        dragging = true;
        selectedBoxId = boxId;
        renderAllTextBoxes();
        
        const box = textBoxes.find(b => b.id === boxId);
        const overlay = document.querySelector(`.text-overlay[data-id="${boxId}"]`);
        
        dragStart.x = e.clientX;
        dragStart.y = e.clientY;
        originalBox.x = box.x;
        originalBox.y = box.y;
        
        overlay.style.cursor = 'grabbing';
        document.body.style.cursor = 'grabbing';
    }
    
    // Start resizing
    function startResize(e, boxId) {
        e.stopPropagation();
        resizing = true;
        selectedBoxId = boxId;
        renderAllTextBoxes();
        
        const box = textBoxes.find(b => b.id === boxId);
        const overlay = document.querySelector(`.text-overlay[data-id="${boxId}"]`);
        
        dragStart.x = e.clientX;
        dragStart.y = e.clientY;
        originalBox.w = box.w;
        originalBox.h = box.h;
        originalBox.x = box.x;
        originalBox.y = box.y;
        
        overlay.style.cursor = 'nw-resize';
        document.body.style.cursor = 'nw-resize';
    }
    
    // Global mouse move
    window.addEventListener('mousemove', (e) => {
        if (dragging && selectedBoxId !== null) {
            const box = textBoxes.find(b => b.id === selectedBoxId);
            if (box) {
                const dx = e.clientX - dragStart.x;
                const dy = e.clientY - dragStart.y;
                box.x = originalBox.x + dx;
                box.y = originalBox.y + dy;
                
                const overlay = document.querySelector(`.text-overlay[data-id="${selectedBoxId}"]`);
                if (overlay) {
                    overlay.style.left = box.x + 'px';
                    overlay.style.top = box.y + 'px';
                }
            }
        } else if (resizing && selectedBoxId !== null) {
            const box = textBoxes.find(b => b.id === selectedBoxId);
            if (box) {
                const dw = e.clientX - dragStart.x;
                const dh = e.clientY - dragStart.y;
                box.w = Math.max(50, originalBox.w + dw);
                box.h = Math.max(25, originalBox.h + dh);
                
                const overlay = document.querySelector(`.text-overlay[data-id="${selectedBoxId}"]`);
                if (overlay) {
                    overlay.style.width = box.w + 'px';
                    overlay.style.height = box.h + 'px';
                    overlay.querySelector('.text-content').style.fontSize = box.fontSize + 'px';
                }
            }
        }
    });
    
    window.addEventListener('mouseup', () => {
        if (dragging || resizing) {
            dragging = false;
            resizing = false;
            document.body.style.cursor = '';
            const overlay = document.querySelector(`.text-overlay[data-id="${selectedBoxId}"]`);
            if (overlay) overlay.style.cursor = 'move';
            saveState();
            statusDiv.innerHTML = '✅ Position/Size saved';
        }
    });
    
    // Add new text box
    function addTextBox() {
        const containerRect = imageContainer.getBoundingClientRect();
        const imgRect = permitImage.getBoundingClientRect();
        
        // Calculate relative position
        const scale = permitImage.clientWidth / permitImage.naturalWidth;
        const centerX = (imgRect.width / 2) - 100;
        const centerY = (imgRect.height / 2) - 20;
        
        const newBox = {
            id: nextId++,
            x: Math.max(0, centerX),
            y: Math.max(0, centerY),
            w: 220,
            h: 32,
            fontSize: 18,
            text: 'NEW TEXT'
        };
        
        textBoxes.push(newBox);
        selectedBoxId = newBox.id;
        renderAllTextBoxes();
        statusDiv.innerHTML = `✅ New text box added. Drag to position, resize to cover old text, then edit text below.`;
        saveState();
    }
    
    // Capture and save image
    async function saveImage() {
        statusDiv.innerHTML = '⏳ Generating image...';
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = permitImage.naturalWidth;
        canvas.height = permitImage.naturalHeight;
        
        // Draw original image
        ctx.drawImage(permitImage, 0, 0, canvas.width, canvas.height);
        
        // Calculate scale
        const scaleX = permitImage.naturalWidth / permitImage.clientWidth;
        const scaleY = permitImage.naturalHeight / permitImage.clientHeight;
        
        // Draw each text box
        textBoxes.forEach(box => {
            const actualX = box.x * scaleX;
            const actualY = box.y * scaleY;
            const actualW = box.w * scaleX;
            const actualH = box.h * scaleY;
            const fontSize = box.fontSize * scaleX;
            
            // Draw white background to cover old text
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(actualX, actualY, actualW, actualH);
            
            // Draw new text
            ctx.font = `bold ${fontSize}px "Courier New", monospace`;
            ctx.fillStyle = '#000000';
            ctx.textBaseline = 'middle';
            
            // Center text in box
            const text = box.text || '';
            ctx.fillText(text, actualX + 5, actualY + (actualH / 2));
        });
        
        const link = document.createElement('a');
        link.download = 'edited_permit.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
        
        statusDiv.innerHTML = '💾 Permit saved and downloaded!';
    }
    
    // Reset all
    function resetAll() {
        if (confirm('Remove all text boxes? This cannot be undone.')) {
            textBoxes = [];
            nextId = 1;
            selectedBoxId = null;
            renderAllTextBoxes();
            statusDiv.innerHTML = '⟳ All text boxes removed. Add new boxes to edit.';
            saveState();
        }
    }
    
    // Load image from file
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        currentImageFile = file;
        const reader = new FileReader();
        reader.onload = (event) => {
            permitImage.src = event.target.result;
            permitImage.onload = () => {
                // Reset text boxes
                textBoxes = [];
                nextId = 1;
                selectedBoxId = null;
                renderAllTextBoxes();
                editorArea.style.display = 'flex';
                statusDiv.innerHTML = '✅ Image loaded! Click "Add text box" to create editable areas. Drag to position, resize to cover old text.';
                saveState();
            };
        };
        reader.readAsDataURL(file);
    });
    
    // Button events
    addBoxBtn.addEventListener('click', addTextBox);
    saveImageBtn.addEventListener('click', saveImage);
    resetAllBtn.addEventListener('click', resetAll);
    
    // Load saved state
    loadState();
</script>
</body>
</html>/
