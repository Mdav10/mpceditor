<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyMom | Simple Text Editor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0e1a;
            font-family: 'Courier New', monospace;
            padding: 20px;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #00ff41;
        }
        .header h1 {
            color: #00ff41;
            font-size: 28px;
        }
        .header p {
            color: #666;
            font-size: 12px;
            margin-top: 5px;
        }
        .upload-area {
            background: #111;
            border: 2px dashed #00ff41;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            margin-bottom: 30px;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #ff00ff;
            background: #1a1a2e;
        }
        .upload-area input {
            display: none;
        }
        .upload-area label {
            color: #00ff41;
            font-size: 16px;
            cursor: pointer;
        }
        .image-container {
            position: relative;
            display: inline-block;
            width: 100%;
            text-align: center;
        }
        .image-wrapper {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }
        #permitImage {
            max-width: 100%;
            height: auto;
            border: 1px solid #00ff41;
            border-radius: 5px;
            background: #fff;
        }
        .editable-text {
            position: absolute;
            background: rgba(0, 255, 65, 0.15);
            border: 1px dashed #00ff41;
            cursor: text;
            transition: all 0.2s;
        }
        .editable-text:hover {
            background: rgba(255, 0, 255, 0.2);
            border-color: #ff00ff;
        }
        .editable-text.editing {
            background: rgba(255, 255, 0, 0.3);
            border: 2px solid #ff00ff;
            z-index: 100;
        }
        .controls {
            background: #111;
            border: 1px solid #00ff41;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
        }
        .controls h3 {
            color: #ff00ff;
            margin-bottom: 15px;
        }
        .button-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        button {
            background: #00ff41;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #ff00ff;
            color: #fff;
        }
        .btn-danger {
            background: #ff4444;
            color: #fff;
        }
        .btn-danger:hover {
            background: #cc0000;
        }
        .status {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 12px;
            color: #00ff41;
            text-align: center;
        }
        .fields-panel {
            margin-top: 20px;
            padding: 15px;
            background: #1a1a2e;
            border-radius: 8px;
        }
        .fields-panel h4 {
            color: #00ff41;
            margin-bottom: 10px;
        }
        .field-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            align-items: center;
        }
        .field-row label {
            color: #ff00ff;
            font-size: 11px;
            width: 100px;
        }
        .field-row input {
            flex: 1;
            background: #222;
            border: 1px solid #00ff41;
            color: #0f0;
            padding: 5px 8px;
            border-radius: 3px;
        }
        .add-field {
            background: #333;
            color: #0f0;
            padding: 5px 10px;
            margin-top: 10px;
        }
        hr {
            border-color: #333;
            margin: 15px 0;
        }
        @media (max-width: 768px) {
            .field-row { flex-wrap: wrap; }
            .field-row label { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📷 MONEYMOM | PERMIT EDITOR</h1>
        <p>Upload image → Click on any text → Type new text → Press ENTER</p>
    </div>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/jpg">
        <label>📤 CLICK TO UPLOAD PERMIT IMAGE (JPG or PNG)</label>
    </div>

    <div class="image-container" id="imageContainer" style="display: none;">
        <div class="image-wrapper" id="imageWrapper">
            <img id="permitImage" alt="Permit Image">
        </div>
    </div>

    <div class="controls" id="controls" style="display: none;">
        <h3>✏️ EDIT CONTROLS</h3>
        <div class="button-group">
            <button id="addTextBoxBtn">➕ ADD NEW TEXT BOX</button>
            <button id="saveImageBtn">💾 SAVE & DOWNLOAD</button>
            <button id="resetImageBtn" class="btn-danger">⟳ RESET TO ORIGINAL</button>
        </div>
        
        <div class="fields-panel" id="fieldsPanel">
            <h4>📋 TEXT BOXES (click any box on image to edit)</h4>
            <div id="textBoxesList"></div>
            <button id="addFieldBtn" class="add-field">+ Add text box</button>
        </div>
        
        <div class="status" id="status">✅ Ready. Click on any text box to edit it.</div>
    </div>
</div>

<script>
    // DOM elements
    const fileInput = document.getElementById('fileInput');
    const imageContainer = document.getElementById('imageContainer');
    const permitImage = document.getElementById('permitImage');
    const imageWrapper = document.getElementById('imageWrapper');
    const controls = document.getElementById('controls');
    const statusDiv = document.getElementById('status');
    const textBoxesList = document.getElementById('textBoxesList');
    const addTextBoxBtn = document.getElementById('addTextBoxBtn');
    const saveImageBtn = document.getElementById('saveImageBtn');
    const resetImageBtn = document.getElementById('resetImageBtn');
    const addFieldBtn = document.getElementById('addFieldBtn');
    
    // Store original image data
    let originalImageSrc = null;
    let currentImage = null;
    let textBoxes = [];
    let nextId = 1;
    let dragging = false;
    let dragStart = null;
    let currentDragBox = null;
    
    // Save state to localStorage
    function saveState() {
        const state = {
            textBoxes: textBoxes,
            imageSrc: originalImageSrc
        };
        localStorage.setItem('permitEditorState', JSON.stringify(state));
    }
    
    // Load state from localStorage
    function loadState() {
        const saved = localStorage.getItem('permitEditorState');
        if (saved) {
            try {
                const state = JSON.parse(saved);
                if (state.imageSrc) {
                    originalImageSrc = state.imageSrc;
                    permitImage.src = state.imageSrc;
                    currentImage = permitImage;
                    textBoxes = state.textBoxes || [];
                    nextId = Math.max(...textBoxes.map(b => b.id), 0) + 1;
                    setTimeout(() => {
                        renderTextBoxes();
                        imageContainer.style.display = 'block';
                        controls.style.display = 'block';
                        statusDiv.innerHTML = '✅ Loaded saved permit. Click on any text box to edit.';
                    }, 100);
                }
            } catch(e) {}
        }
    }
    
    // Render all text boxes on the image
    function renderTextBoxes() {
        // Remove existing overlays
        const existingOverlays = document.querySelectorAll('.editable-text');
        existingOverlays.forEach(el => el.remove());
        
        // Create new overlays
        textBoxes.forEach(box => {
            const div = document.createElement('div');
            div.className = 'editable-text';
            div.setAttribute('data-id', box.id);
            div.style.position = 'absolute';
            div.style.left = box.x + 'px';
            div.style.top = box.y + 'px';
            div.style.width = box.w + 'px';
            div.style.height = box.h + 'px';
            div.style.fontSize = box.fontSize + 'px';
            div.style.fontWeight = 'bold';
            div.style.fontFamily = '"Courier New", monospace';
            div.style.lineHeight = box.h + 'px';
            div.style.paddingLeft = '4px';
            div.style.color = '#000';
            div.style.overflow = 'hidden';
            div.style.whiteSpace = 'nowrap';
            div.textContent = box.text || '';
            
            // Make it draggable
            div.addEventListener('mousedown', startDrag);
            div.addEventListener('dblclick', (e) => {
                e.stopPropagation();
                startEditing(box.id);
            });
            
            imageWrapper.appendChild(div);
        });
        
        // Update fields panel
        updateFieldsPanel();
        saveState();
    }
    
    // Update the fields panel list
    function updateFieldsPanel() {
        if (textBoxes.length === 0) {
            textBoxesList.innerHTML = '<p style="color:#666;">No text boxes. Click "Add text box" to create one.</p>';
            return;
        }
        
        let html = '';
        textBoxes.forEach(box => {
            html += `
                <div class="field-row" data-id="${box.id}">
                    <label>📦 Box ${box.id}:</label>
                    <input type="text" class="box-text-input" data-id="${box.id}" value="${escapeHtml(box.text || '')}" placeholder="Text content">
                    <button class="delete-box-btn" data-id="${box.id}" style="background:#ff4444; color:#fff; padding:3px 8px;">✕</button>
                </div>
            `;
        });
        textBoxesList.innerHTML = html;
        
        // Add event listeners to inputs
        document.querySelectorAll('.box-text-input').forEach(input => {
            input.addEventListener('change', (e) => {
                const id = parseInt(input.dataset.id);
                const box = textBoxes.find(b => b.id === id);
                if (box) {
                    box.text = input.value;
                    renderTextBoxes();
                    statusDiv.innerHTML = `✅ Updated text box ${id} to: "${box.text}"`;
                }
            });
        });
        
        // Add delete buttons
        document.querySelectorAll('.delete-box-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const id = parseInt(btn.dataset.id);
                textBoxes = textBoxes.filter(b => b.id !== id);
                renderTextBoxes();
                statusDiv.innerHTML = `🗑️ Deleted text box ${id}`;
            });
        });
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Start editing a text box
    function startEditing(boxId) {
        const box = textBoxes.find(b => b.id === boxId);
        if (!box) return;
        
        const overlay = document.querySelector(`.editable-text[data-id="${boxId}"]`);
        if (!overlay) return;
        
        // Remove editing class from all
        document.querySelectorAll('.editable-text').forEach(el => el.classList.remove('editing'));
        overlay.classList.add('editing');
        
        // Create input element
        const rect = overlay.getBoundingClientRect();
        const containerRect = imageWrapper.getBoundingClientRect();
        
        const input = document.createElement('input');
        input.type = 'text';
        input.value = box.text || '';
        input.style.position = 'fixed';
        input.style.left = rect.left + 'px';
        input.style.top = rect.top + 'px';
        input.style.width = rect.width + 'px';
        input.style.height = rect.height + 'px';
        input.style.fontSize = box.fontSize + 'px';
        input.style.fontWeight = 'bold';
        input.style.fontFamily = '"Courier New", monospace';
        input.style.backgroundColor = '#ffffcc';
        input.style.color = '#000';
        input.style.border = '2px solid #ff00ff';
        input.style.outline = 'none';
        input.style.padding = '0 4px';
        input.style.zIndex = '10000';
        input.style.boxSizing = 'border-box';
        
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                box.text = input.value;
                renderTextBoxes();
                document.body.removeChild(input);
                statusDiv.innerHTML = `✅ Saved "${box.text}" to box ${boxId}`;
            } else if (e.key === 'Escape') {
                document.body.removeChild(input);
                statusDiv.innerHTML = `❌ Editing cancelled`;
                overlay.classList.remove('editing');
            }
        });
        
        input.addEventListener('blur', () => {
            if (document.body.contains(input)) {
                box.text = input.value;
                renderTextBoxes();
                document.body.removeChild(input);
                statusDiv.innerHTML = `✅ Saved "${box.text}" to box ${boxId}`;
            }
        });
        
        document.body.appendChild(input);
        input.focus();
        input.select();
        
        statusDiv.innerHTML = `✏️ Editing box ${boxId} — type new text, press ENTER to save`;
    }
    
    // Drag functionality
    function startDrag(e) {
        const overlay = e.target.closest('.editable-text');
        if (!overlay) return;
        
        dragging = true;
        currentDragBox = overlay;
        dragStart = {
            x: e.clientX,
            y: e.clientY,
            left: parseInt(overlay.style.left),
            top: parseInt(overlay.style.top)
        };
        
        overlay.style.cursor = 'grabbing';
        e.preventDefault();
    }
    
    function onDrag(e) {
        if (!dragging || !currentDragBox) return;
        
        const dx = e.clientX - dragStart.x;
        const dy = e.clientY - dragStart.y;
        
        const newLeft = dragStart.left + dx;
        const newTop = dragStart.top + dy;
        
        currentDragBox.style.left = newLeft + 'px';
        currentDragBox.style.top = newTop + 'px';
        
        // Update stored coordinates
        const boxId = parseInt(currentDragBox.dataset.id);
        const box = textBoxes.find(b => b.id === boxId);
        if (box) {
            box.x = newLeft;
            box.y = newTop;
            saveState();
        }
    }
    
    function stopDrag() {
        if (currentDragBox) {
            currentDragBox.style.cursor = 'text';
            currentDragBox = null;
        }
        dragging = false;
        saveState();
    }
    
    // Add new text box
    function addTextBox() {
        const wrapperRect = imageWrapper.getBoundingClientRect();
        const imgRect = permitImage.getBoundingClientRect();
        
        // Center of image
        const centerX = (imgRect.width / 2) - 100;
        const centerY = (imgRect.height / 2) - 15;
        
        const newBox = {
            id: nextId++,
            x: Math.max(0, centerX),
            y: Math.max(0, centerY),
            w: 200,
            h: 25,
            fontSize: 14,
            text: 'New text'
        };
        
        textBoxes.push(newBox);
        renderTextBoxes();
        statusDiv.innerHTML = `✅ Added new text box. Click and drag to move it, double-click to edit text.`;
    }
    
    // Capture image with text boxes
    function captureImage() {
        return new Promise((resolve) => {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            
            canvas.width = permitImage.naturalWidth;
            canvas.height = permitImage.naturalHeight;
            
            // Draw original image
            ctx.drawImage(permitImage, 0, 0, canvas.width, canvas.height);
            
            // Calculate scale between displayed image and actual image
            const scaleX = permitImage.naturalWidth / permitImage.clientWidth;
            const scaleY = permitImage.naturalHeight / permitImage.clientHeight;
            
            // Draw each text box
            textBoxes.forEach(box => {
                const actualX = box.x * scaleX;
                const actualY = box.y * scaleY;
                const actualW = box.w * scaleX;
                const actualH = box.h * scaleY;
                const fontSize = box.fontSize * scaleX;
                
                // Erase background (fill with white to cover old text)
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(actualX, actualY, actualW, actualH);
                
                // Draw new text
                ctx.font = `bold ${fontSize}px "Courier New", monospace`;
                ctx.fillStyle = '#000000';
                ctx.fillText(box.text || '', actualX + 4, actualY + (actualH * 0.7));
            });
            
            resolve(canvas.toDataURL('image/png'));
        });
    }
    
    // Save image
    async function saveImage() {
        statusDiv.innerHTML = '⏳ Generating image...';
        const dataUrl = await captureImage();
        const link = document.createElement('a');
        link.download = 'edited_permit.png';
        link.href = dataUrl;
        link.click();
        statusDiv.innerHTML = '💾 Permit saved and downloaded!';
    }
    
    // Reset to original
    function resetImage() {
        if (confirm('Reset all text boxes?')) {
            textBoxes = [];
            nextId = 1;
            renderTextBoxes();
            statusDiv.innerHTML = '⟳ Reset to original. All text boxes removed.';
        }
    }
    
    // Load image from file
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (event) => {
            originalImageSrc = event.target.result;
            permitImage.src = originalImageSrc;
            currentImage = permitImage;
            textBoxes = [];
            nextId = 1;
            
            permitImage.onload = () => {
                imageContainer.style.display = 'block';
                controls.style.display = 'block';
                renderTextBoxes();
                statusDiv.innerHTML = '✅ Image loaded! Click "Add text box" to create editable areas, then double-click to edit text.';
                saveState();
            };
        };
        reader.readAsDataURL(file);
    });
    
    // Add event listeners
    addTextBoxBtn.addEventListener('click', addTextBox);
    addFieldBtn.addEventListener('click', addTextBox);
    saveImageBtn.addEventListener('click', saveImage);
    resetImageBtn.addEventListener('click', resetImage);
    
    // Global drag events
    window.addEventListener('mousemove', onDrag);
    window.addEventListener('mouseup', stopDrag);
    
    // Load saved state on startup
    loadState();
    
    // Initial status
    if (textBoxes.length === 0 && !originalImageSrc) {
        statusDiv.innerHTML = '📌 Upload a permit image, then click "Add text box" to create editable areas. Double-click any box to edit text.';
    }
</script>
</body>
</html>
